name: Upstream drift check

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Compare pinned MCP versions against npm
        id: check
        run: node scripts/check-drift.mjs

      - name: Open or update drift issue
        if: steps.check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Upstream MCP version drift"
          existing=$(gh issue list --state open --search "$title in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file drift-report.md
          else
            gh issue create --title "$title" --body-file drift-report.md
          fi
