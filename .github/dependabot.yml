version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
    # Dependabot will propose SHA-pinned updates for any actions that drift.
    # Review each update against the upstream release before merging.
